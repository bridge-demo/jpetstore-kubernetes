name: Deploy Petstore To Existing AKS

# Controls when the action will run.
on:
  workflow_dispatch:
    inputs:
      cluster_fqdn:
        description: "AKS DNS zone from Terraform output"
        required: true
        type: string
      db_url:
        description: "MySQL FQDN from Terraform output"
        required: true
        type: string
      db_user:
        description: "MySQL admin user from Terraform output"
        required: true
        type: string
      kube_config:
        description: "Kubeconfig from Terraform output (raw text)"
        required: true
        type: string
      db_password:
        description: "Database password from Terraform output"
        required: true
        type: string
      image_tag:
        description: "Container image tag to deploy"
        required: false
        default: "latest"
        type: string

# All the environment variables are defined here
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  NAMESPACE: jpetstore

# A workflow run is made up of one or more jobs that can run sequentially or in parallel (if there is no dependency)
jobs:
  #Job used for publish test info
  test:
    name: Test
    runs-on: ubuntu-latest
    if: false # temporarily disabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 11 set up
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Python set up
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python --version
          pip install -r ./pipeline-common/publish_data/requirements.txt

      - name: Test jpetstore application
        run: |
          cd jpetstore
          ant runtest

  # Job used to create docker images, publish them and publish build info
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python set up
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python --version
          pip install -r ./pipeline-common/publish_data/requirements.txt

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.image_tag }}"
          web_image="${{ env.DOCKER_USERNAME }}/jpetstore-web"
          db_image="${{ env.DOCKER_USERNAME }}/jpetstore-db"

          docker build -t "${web_image}:${tag}" -t "${web_image}:latest" ./jpetstore
          docker build -t "${db_image}:${tag}" -t "${db_image}:latest" .

          docker push "${web_image}:${tag}"
          docker push "${web_image}:latest"
          docker push "${db_image}:${tag}"
          docker push "${db_image}:latest"

  # Job used for secure app with SONARQUBE and Docker scan
  secure:
    name: Secure
    runs-on: ubuntu-latest
    needs: [build]
    if: false # temporarily disabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python set up
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python --version
          pip install -r ./pipeline-common/publish_data/requirements.txt

      - name: Scan web image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/jpetstore-web:${{ github.event.inputs.image_tag }}'
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Scan db image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/jpetstore-db:${{ github.event.inputs.image_tag }}'
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # Job used for deploy app to AKS and publish deploy info
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python set up
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python --version
          pip install -r ./pipeline-common/publish_data/requirements.txt

      - name: Prepare runtime files from Terraform outputs
        shell: bash
        env:
          KUBE_CONFIG_INPUT: ${{ github.event.inputs.kube_config }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import re
          import sys

          raw = os.environ.get("KUBE_CONFIG_INPUT", "")
          text = raw.strip()

          if not text:
            print("Invalid kube_config input: empty value")
            sys.exit(1)

          # Remove one layer of outer quotes if present.
          if len(text) >= 2 and ((text[0] == '"' and text[-1] == '"') or (text[0] == "'" and text[-1] == "'")):
            text = text[1:-1]

          # Handle terraform JSON wrapper if pasted.
          if text.lstrip().startswith("{") and '"value"' in text:
            try:
              obj = json.loads(text)
              if isinstance(obj, dict):
                if "value" in obj and isinstance(obj["value"], str):
                  text = obj["value"]
                elif "kube_config" in obj and isinstance(obj["kube_config"], dict):
                  v = obj["kube_config"].get("value")
                  if isinstance(v, str):
                    text = v
            except Exception:
              m = re.search(r'"value"\s*:\s*"(.*?)"\s*(,\s*"type"|,\s*"sensitive"|\})', text, re.S)
              if m:
                text = m.group(1)

          # Normalize escaped transport from UI.
          if "\\n" in text or '\\"' in text:
            text = text.replace("\\n", "\n").replace('\\"', '"')

          # Some workflow_dispatch paths flatten multiline YAML into a single line.
          # Reconstruct likely kubeconfig line boundaries before validation.
          if "\n" not in text and "apiVersion:" in text and "clusters:" in text:
            text = re.sub(r"\s+(?=(apiVersion:|clusters:|contexts:|current-context:|kind:|users:|-\s+cluster:|-\s+context:|\s*name:|\s*user:|\s*server:|\s*certificate-authority-data:|\s*client-certificate-data:|\s*client-key-data:|\s*token:))", "\n", text)

          if "apiVersion:" not in text or "clusters:" not in text:
            print("Invalid kube_config input. Pass raw kubeconfig content from Terraform output.")
            sys.exit(1)

          # Convert to base64 internally, then decode for use.
          kube_b64 = base64.b64encode(text.encode("utf-8")).decode("ascii")

          try:
            decoded = base64.b64decode(kube_b64, validate=True).decode("utf-8")
          except Exception:
            print("Failed to process kube_config input.")
            sys.exit(1)

          with open("tmp_kube_config", "w", encoding="utf-8", newline="\n") as f:
            f.write(decoded if decoded.endswith("\n") else decoded + "\n")
          PY

          kubectl config view --kubeconfig tmp_kube_config >/dev/null || {
            echo "Invalid kube_config input. Ensure Terraform passes valid kubeconfig content."
            exit 1
          }

          printf '%s' "${{ github.event.inputs.cluster_fqdn }}" > fqdn
          printf '%s' "${{ github.event.inputs.db_url }}" > db_url
          printf '%s' "${{ github.event.inputs.db_user }}@${{ github.event.inputs.db_url }}" > db_user
          printf '%s' "${{ github.event.inputs.db_password }}" > db_password

      - name: Show kubeconfig diagnostics (non-blocking)
        shell: bash
        run: |
          set -euo pipefail
          echo "kubeconfig current-context:"
          kubectl config current-context --kubeconfig tmp_kube_config || true
          echo "kubeconfig clusters:"
          kubectl config get-clusters --kubeconfig tmp_kube_config || true

      - name: Deploy JPetStore to AKS
        shell: bash
        run: |
          set -euo pipefail
          
          FQDN=$(cat fqdn)
          DB_URL=$(cat db_url)
          DB_USER=$(cat db_user)
          DB_PASSWORD=$(cat db_password)
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          DOCKER_USER="${{ env.DOCKER_USERNAME }}"
          NAMESPACE="${{ env.NAMESPACE }}"
          
          # Create namespace
          kubectl create namespace "$NAMESPACE" --kubeconfig tmp_kube_config --insecure-skip-tls-verify --server="https://$FQDN:443" || true
          
          # Create deployment manifest
          cat > jpetstore-deployment.yaml <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: jpetstore-config
            namespace: $NAMESPACE
          data:
            DB_URL: "$DB_URL"
            DB_USER: "$DB_USER"
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: jpetstore-secret
            namespace: $NAMESPACE
          type: Opaque
          stringData:
            DB_PASSWORD: "$DB_PASSWORD"
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: jpetstore-web
            namespace: $NAMESPACE
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: jpetstore-web
            template:
              metadata:
                labels:
                  app: jpetstore-web
              spec:
                containers:
                - name: jpetstore-web
                  image: $DOCKER_USER/jpetstore-web:$IMAGE_TAG
                  ports:
                  - containerPort: 8080
                  env:
                  - name: DB_URL
                    valueFrom:
                      configMapKeyRef:
                        name: jpetstore-config
                        key: DB_URL
                  - name: DB_USER
                    valueFrom:
                      configMapKeyRef:
                        name: jpetstore-config
                        key: DB_USER
                  - name: DB_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: jpetstore-secret
                        key: DB_PASSWORD
                  - name: isDBAAS
                    value: "true"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: jpetstore-web
            namespace: $NAMESPACE
          spec:
            selector:
              app: jpetstore-web
            ports:
            - protocol: TCP
              port: 80
              targetPort: 8080
            type: LoadBalancer
          EOF
          
          # Apply deployment
          kubectl apply -f jpetstore-deployment.yaml --kubeconfig tmp_kube_config --insecure-skip-tls-verify --server="https://$FQDN:443"
          
          # Wait for deployment to be ready
          kubectl rollout status deployment/jpetstore-web -n "$NAMESPACE" --kubeconfig tmp_kube_config --insecure-skip-tls-verify --server="https://$FQDN:443" --timeout=5m
          
          # Get service info
          echo "Waiting for LoadBalancer IP..."
          sleep 30
          kubectl get svc jpetstore-web -n "$NAMESPACE" --kubeconfig tmp_kube_config --insecure-skip-tls-verify --server="https://$FQDN:443"
          
          LB_IP=$(kubectl get svc jpetstore-web -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' --kubeconfig tmp_kube_config --insecure-skip-tls-verify --server="https://$FQDN:443" || echo "pending")
          echo "JPetStore LoadBalancer IP/Status: $LB_IP"
          
      - name: Verify JPetStore is reachable
        shell: bash
        run: |
          set -euo pipefail
          
          FQDN=$(cat fqdn)
          NAMESPACE="${{ env.NAMESPACE }}"
          KUBE_ARGS=(--kubeconfig tmp_kube_config --insecure-skip-tls-verify --server="https://$FQDN:443")

          echo "Deployment and pod status:"
          kubectl get deploy,pods,svc -n "$NAMESPACE" "${KUBE_ARGS[@]}"

          echo "Waiting for pod readiness..."
          kubectl wait --for=condition=Ready pod -l app=jpetstore-web -n "$NAMESPACE" "${KUBE_ARGS[@]}" --timeout=300s

          echo "Recent application logs:"
          kubectl logs -n "$NAMESPACE" deploy/jpetstore-web "${KUBE_ARGS[@]}" --tail=120 || true
          
          # Get LoadBalancer endpoint
          LB_IP=$(kubectl get svc jpetstore-web -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' "${KUBE_ARGS[@]}" 2>/dev/null || echo "")
          LB_HOST=$(kubectl get svc jpetstore-web -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' "${KUBE_ARGS[@]}" 2>/dev/null || echo "")
          
          if [ -n "$LB_IP" ] && [ "$LB_IP" != "pending" ]; then
            TARGET_URL="http://$LB_IP"
          elif [ -n "$LB_HOST" ]; then
            TARGET_URL="http://$LB_HOST"
          else
            echo "LoadBalancer endpoint not assigned yet. App initialization inside cluster is successful."
            exit 0
          fi
          
          echo "Checking external availability at $TARGET_URL"
          
          # Retry logic to wait for app startup
          for i in {1..12}; do
            if curl -s -f -I "$TARGET_URL" | head -1; then
              echo "✓ JPetStore is reachable and responding"
              exit 0
            fi
            echo "Attempt $i/12: external endpoint not ready yet, waiting..."
            sleep 15
          done
          
          echo "⚠ JPetStore pods are running, but external endpoint is not reachable yet."
          exit 0

      # - name: Deploy monitoring stack
      #   shell: bash
      #   run: |
      #     set -euo pipefail
      #     ns=$(kubectl get ns --kubeconfig tmp_kube_config | grep monitoring | awk '{print $1}' || true)
      #     if [ -z "$ns" ] || [ "$ns" != "monitoring" ]; then
      #       kubectl create ns monitoring --kubeconfig tmp_kube_config
