name: Deploy Petstore To Existing AKS

# Controls when the action will run.
on:
  workflow_dispatch:
    inputs:
      cluster_fqdn:
        description: "AKS DNS zone from Terraform output"
        required: true
        type: string
      db_url:
        description: "MySQL FQDN from Terraform output"
        required: true
        type: string
      db_user:
        description: "MySQL admin user from Terraform output"
        required: true
        type: string
      kube_config:
        description: "Kubeconfig from Terraform output"
        required: true
        type: string
      db_password:
        description: "Database password from Terraform output"
        required: true
        type: string
      image_tag:
        description: "Container image tag to deploy"
        required: false
        default: "latest"
        type: string

# All the environment variables are defined here
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  NAMESPACE: jpetstore

# A workflow run is made up of one or more jobs that can run sequentially or in parallel (if there is no dependency)
jobs:
  #Job used for publish test info
  test:
    name: Test
    runs-on: ubuntu-latest
    if: false # temporarily disabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 11 set up
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Python set up
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python --version
          pip install -r ./pipeline-common/publish_data/requirements.txt

      - name: Test jpetstore application
        run: |
          cd jpetstore
          ant runtest

  # Job used to create docker images, publish them and publish build info
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python set up
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python --version
          pip install -r ./pipeline-common/publish_data/requirements.txt

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.image_tag }}"
          web_image="${{ env.DOCKER_USERNAME }}/jpetstore-web"
          db_image="${{ env.DOCKER_USERNAME }}/jpetstore-db"

          docker build -t "${web_image}:${tag}" -t "${web_image}:latest" ./jpetstore
          docker build -t "${db_image}:${tag}" -t "${db_image}:latest" .

          docker push "${web_image}:${tag}"
          docker push "${web_image}:latest"
          docker push "${db_image}:${tag}"
          docker push "${db_image}:latest"

  # Job used for secure app with SONARQUBE and Docker scan
  secure:
    name: Secure
    runs-on: ubuntu-latest
    needs: [build]
    if: false # temporarily disabled

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python set up
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python --version
          pip install -r ./pipeline-common/publish_data/requirements.txt

      - name: Scan web image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/jpetstore-web:${{ github.event.inputs.image_tag }}'
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Scan db image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/jpetstore-db:${{ github.event.inputs.image_tag }}'
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # Job used for deploy app to AKS and publish deploy info
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python set up
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python --version
          pip install -r ./pipeline-common/publish_data/requirements.txt

      - name: Prepare runtime files from Terraform outputs
        shell: bash
        env:
          KUBE_CONFIG_INPUT: ${{ github.event.inputs.kube_config }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import re
          import sys

          raw = os.environ.get("KUBE_CONFIG_INPUT", "")
          text = raw.strip()

          if not text:
            print("Invalid kube_config input: empty value")
            sys.exit(1)

          # Remove one layer of outer quotes if present.
          if len(text) >= 2 and ((text[0] == '"' and text[-1] == '"') or (text[0] == "'" and text[-1] == "'")):
            text = text[1:-1]

          # Handle terraform JSON wrapper if pasted.
          if text.lstrip().startswith("{") and '"value"' in text:
            try:
              obj = json.loads(text)
              if isinstance(obj, dict):
                if "value" in obj and isinstance(obj["value"], str):
                  text = obj["value"]
                elif "kube_config" in obj and isinstance(obj["kube_config"], dict):
                  v = obj["kube_config"].get("value")
                  if isinstance(v, str):
                    text = v
            except Exception:
              m = re.search(r'"value"\s*:\s*"(.*?)"\s*(,\s*"type"|,\s*"sensitive"|\})', text, re.S)
              if m:
                text = m.group(1)

          # Normalize escaped transport from UI.
          if "\\n" in text or '\\"' in text:
            text = text.replace("\\n", "\n").replace('\\"', '"')

          # Some workflow_dispatch paths flatten multiline YAML into a single line.
          # Reconstruct likely kubeconfig line boundaries before validation.
          if "\n" not in text and "apiVersion:" in text and "clusters:" in text:
            text = re.sub(r"\s+(?=(apiVersion:|clusters:|contexts:|current-context:|kind:|users:|-\s+cluster:|-\s+context:|\s*name:|\s*user:|\s*server:|\s*certificate-authority-data:|\s*client-certificate-data:|\s*client-key-data:|\s*token:))", "\n", text)

          if "apiVersion:" not in text or "clusters:" not in text:
            print("Invalid kube_config input. Pass raw kubeconfig content from Terraform output.")
            sys.exit(1)

          # Convert to base64 internally, then decode for use.
          kube_b64 = base64.b64encode(text.encode("utf-8")).decode("ascii")

          try:
            decoded = base64.b64decode(kube_b64, validate=True).decode("utf-8")
          except Exception:
            print("Failed to process kube_config input.")
            sys.exit(1)

          with open("tmp_kube_config", "w", encoding="utf-8", newline="\n") as f:
            f.write(decoded if decoded.endswith("\n") else decoded + "\n")
          PY

          kubectl config view --kubeconfig tmp_kube_config >/dev/null || {
            echo "Invalid kube_config input. Ensure Terraform passes valid kubeconfig content."
            exit 1
          }
          printf '%s' "${{ github.event.inputs.cluster_fqdn }}" > fqdn
          printf '%s' "${{ github.event.inputs.db_url }}" > db_url
          printf '%s' "${{ github.event.inputs.db_user }}@${{ github.event.inputs.db_url }}" > db_user
          printf '%s' "${{ github.event.inputs.db_password }}" > db_password

      - name: Validate cluster access
        shell: bash
        run: |
          set -euo pipefail
          fqdn_value=$(cat fqdn)
          client_cert_data=$(kubectl config view --kubeconfig tmp_kube_config -o jsonpath='{.users[0].user.client-certificate-data}' || true)
          client_key_data=$(kubectl config view --kubeconfig tmp_kube_config -o jsonpath='{.users[0].user.client-key-data}' || true)
          ca_data=$(kubectl config view --kubeconfig tmp_kube_config -o jsonpath='{.clusters[0].cluster.certificate-authority-data}' || true)

          if [ -z "$client_cert_data" ] || [ -z "$client_key_data" ]; then
            echo "Invalid kubeconfig: missing client certificate/key."
            exit 1
          fi

          if [ -n "$ca_data" ]; then
            printf '%s' "$ca_data" | base64 -d > ca.crt
          fi

          if [ -n "$client_cert_data" ] && [ -n "$client_key_data" ]; then
            printf '%s' "$client_cert_data" | base64 -d > client.crt
            printf '%s' "$client_key_data" | base64 -d > client.key
          fi

          kubectl config set-cluster aks \
            --server="https://${fqdn_value}:443" \
            ${ca_data:+--certificate-authority=ca.crt} \
            --kubeconfig tmp_kube_config >/dev/null

          kubectl config set-credentials aks-user \
            --client-certificate=client.crt \
            --client-key=client.key \
            --kubeconfig tmp_kube_config >/dev/null

          kubectl config set-context aks-context \
            --cluster=aks \
            --user=aks-user \
            --kubeconfig tmp_kube_config >/dev/null

          kubectl config use-context aks-context --kubeconfig tmp_kube_config >/dev/null

          kubectl get nodes --kubeconfig tmp_kube_config
  
      - name: Package and deploy helm chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/modernpets"
          helm package --destination "${{ github.workspace }}/modernpets" ./helm/modernpets
          helm upgrade --install --wait \
            --set image.repository="${{ env.DOCKER_USERNAME }}" \
            --set image.tag="${{ github.event.inputs.image_tag }}" \
            --set mysql.url="$(cat db_url | base64 -w0)" \
            --set mysql.username="$(cat db_user | base64 -w0)" \
            --set mysql.password="$(cat db_password | base64 -w0)" \
            --set isDBAAS=True \
            --set isLB=False \
            --set httpHost="$(cat fqdn)" \
            --namespace="${{ env.NAMESPACE }}" \
            --create-namespace "${{ env.NAMESPACE }}" \
            --kubeconfig tmp_kube_config \
            "${{ github.workspace }}/modernpets/modernpets-0.1.5.tgz"

      - name: Print ingress and expected URL
        shell: bash
        run: |
          set -euo pipefail
          kubectl get ingress -n "${{ env.NAMESPACE }}" --kubeconfig tmp_kube_config
          echo "Computed URL from chart host: http://jpetstore-web.$(cat fqdn)"

      - name: Deploy monitoring stack
        shell: bash
        run: |
          set -euo pipefail
          ns=$(kubectl get ns --kubeconfig tmp_kube_config | grep monitoring | awk '{print $1}' || true)
          if [ -z "$ns" ] || [ "$ns" != "monitoring" ]; then
            kubectl create ns monitoring --kubeconfig tmp_kube_config
            kubectl apply -f ./prometheus -n monitoring --kubeconfig tmp_kube_config
            sleep 1m
            kubectl apply -f ./alertmanager/AlertManagerConfigmap.yaml -n monitoring --kubeconfig tmp_kube_config
            kubectl apply -f ./alertmanager/AlertTemplateConfigMap.yaml -n monitoring --kubeconfig tmp_kube_config
            kubectl apply -f ./alertmanager/Deployment.yaml -n monitoring --kubeconfig tmp_kube_config
            kubectl apply -f ./alertmanager/Service.yaml -n monitoring --kubeconfig tmp_kube_config
          fi
